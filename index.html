<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Controle Financeiro</title>
    <!-- Modern PWA and Mobile Meta Tags -->
    <meta name="theme-color" content="#344E41" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="brand">CONTROLE FINANCEIRO</div>
        <div class="balance-container">
          <div class="balance-label">Saldo Atual (Recebido)</div>
          <div id="total-balance-real" class="balance-value">R$ 0,00</div>
          <div id="total-balance-planned" class="balance-sub-label">Previsto: R$ 0,00</div>
          
          <div class="base-salary-container">
            <span>Salário Base:</span>
            <strong id="base-salary-display">R$ 0,00</strong>
            <button id="edit-base-salary" class="edit-salary-btn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
          </div>
          
          <div class="month-navigator">
            <button id="prev-month" class="nav-btn">&larr;</button>
            <div id="current-month-display" class="month-display">Abril 2026</div>
            <button id="next-month" class="nav-btn">&rarr;</button>
          </div>

          <div class="reset-container">
            <button id="reset-month-btn" class="reset-month-btn">Finalizar Mês</button>
          </div>

          <div class="summary-grid">
            <div class="summary-item">
              <div class="summary-item-label">Receitas</div>
              <div id="total-income" class="summary-item-value income">R$ 0,00</div>
            </div>
            <div class="summary-item">
              <div class="summary-item-label">Despesas</div>
              <div id="total-expense" class="summary-item-value expense">R$ 0,00</div>
            </div>
          </div>
        </div>
      </header>

      <main>
        <section class="content-section">
          <div class="section-header">
            <h2 class="section-title">Ganhos do Mês</h2>
            <button id="add-income-btn" class="add-btn">+</button>
          </div>
          <div id="income-list" class="transaction-list">
            <!-- Items injected by JS -->
            <div class="empty-state">Nenhum ganho registrado</div>
          </div>
        </section>

        <section class="content-section">
          <div class="section-header">
            <h2 class="section-title">Gastos e Contas</h2>
            <button id="add-expense-btn" class="add-btn">+</button>
          </div>
          <div id="expense-list" class="transaction-list">
            <!-- Items injected by JS -->
            <div class="empty-state">Nenhuma despesa registrada</div>
          </div>
        </section>
      </main>

      <!-- Entry Modal -->
      <div id="modal" class="modal-overlay">
        <div class="modal-content">
          <h2 id="modal-title" class="modal-title">Novo Lançamento</h2>
          <form id="transaction-form">
            <input type="hidden" id="edit-id" />
            
            <div id="bulk-items-container">
              <!-- As linhas de lançamento serão injetadas aqui -->
            </div>

            <button type="button" id="add-row-btn" class="btn btn-secondary" style="margin-top: 1rem; width: 100%; font-size: 0.85rem; padding: 0.5rem;">
              + Adicionar Outro Item
            </button>

            <div class="btn-group" style="margin-top: 2rem;">
              <button type="button" id="cancel-btn" class="btn btn-secondary">Cancelar</button>
              <button type="submit" class="btn btn-primary">Salvar Todos</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Salary Modal -->
      <div id="salary-modal" class="modal-overlay">
        <div class="modal-content">
          <h2 class="modal-title">Configurar Salário Base</h2>
          <form id="salary-form">
            <div class="form-group">
              <label for="base-salary-input">Valor Mensal (R$)</label>
              <input type="number" id="base-salary-input" class="form-input" placeholder="0,00" step="0.01" required />
            </div>
            <div class="btn-group">
              <button type="button" id="salary-cancel-btn" class="btn btn-secondary">Cancelar</button>
              <button type="submit" class="btn btn-primary">Definir</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Confirm Modal -->
      <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
          <h2 id="confirm-title" class="modal-title">Confirmar Ação</h2>
          <p id="confirm-message" style="margin-bottom: 2rem; color: var(--text-muted);"></p>
          <div class="btn-group">
            <button type="button" id="confirm-cancel-btn" class="btn btn-secondary">Não</button>
            <button type="button" id="confirm-ok-btn" class="btn btn-primary">Sim, Confirmar</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
